name: Deploy MkDocs site

on:
  push:
    branches:
      - main

permissions:
  contents: write   # <-- top-level, not inside jobs

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # upgraded from v3

      - name: Set up Python
        uses: actions/setup-python@v5   # upgraded from v4
        with:
          python-version: '3.12'        # pin a stable version

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          # Add any plugins you use, for example:
          # pip install mkdocs-blog-plugin mkdocs-awesome-pages-plugin

      - name: Build and deploy
        run: |
          mkdocs gh-deploy --force
